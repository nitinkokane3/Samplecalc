<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Advanced Calculator</title>
<link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app">
    <div class="calculator" id="calculator">
      <div class="top-bar">
        <div class="mode-switch">
          <button class="mode-btn active" data-mode="standard" data-i18n="standard">Standard</button>
          <button class="mode-btn" data-mode="scientific" data-i18n="scientific">Scientific</button>
        </div>
        <div class="top-actions">
          <button class="icon-btn" id="historyToggle" title="History" data-i18n-title="historyToggleTitle">🕘</button>
          <button class="icon-btn lang-btn" id="langToggle" title="Toggle language" data-i18n-title="langToggleTitle">EN</button>
          <button class="icon-btn" id="themeToggle" title="Toggle theme" data-i18n-title="themeToggleTitle">🌙</button>
        </div>
      </div>

      <div class="display">
        <div class="expression" id="expression"></div>
        <div class="result" id="result">0</div>
        <div class="memory-indicator" id="memoryIndicator"></div>
      </div>

      <div class="panels">
        <div class="history-panel" id="historyPanel">
          <div class="history-header">
            <span data-i18n="historyLabel">History</span>
            <button id="clearHistory" data-i18n="clearLabel">Clear</button>
          </div>
          <ul id="historyList" class="history-list"></ul>
        </div>

        <div class="keys-wrapper">
          <div class="sci-row" id="sciRow">
            <button class="key fn" data-action="deg-rad" id="degRadBtn">RAD</button>
            <button class="key fn" data-action="fn" data-value="sin(">sin</button>
            <button class="key fn" data-action="fn" data-value="cos(">cos</button>
            <button class="key fn" data-action="fn" data-value="tan(">tan</button>
            <button class="key fn" data-action="fn" data-value="log(">log</button>
            <button class="key fn" data-action="fn" data-value="ln(">ln</button>
            <button class="key fn" data-action="pow2">x²</button>
            <button class="key fn" data-action="pow">x^y</button>
            <button class="key fn" data-action="sqrt">√</button>
            <button class="key fn" data-action="fact">n!</button>
            <button class="key fn" data-value="(" data-action="paren">(</button>
            <button class="key fn" data-value=")" data-action="paren">)</button>
            <button class="key fn" data-action="const" data-value="π">π</button>
            <button class="key fn" data-action="const" data-value="e">e</button>
            <button class="key fn" data-action="inv">1/x</button>
          </div>

          <div class="keys" id="keys">
            <button class="key memory" data-action="mc">MC</button>
            <button class="key memory" data-action="mr">MR</button>
            <button class="key memory" data-action="mplus">M+</button>
            <button class="key memory" data-action="mminus">M-</button>

            <button class="key op-light" data-action="clear-entry">CE</button>
            <button class="key op-light" data-action="clear">C</button>
            <button class="key op-light" data-action="backspace">⌫</button>
            <button class="key operator" data-action="operator" data-value="/">÷</button>

            <button class="key num" data-action="num" data-value="7">7</button>
            <button class="key num" data-action="num" data-value="8">8</button>
            <button class="key num" data-action="num" data-value="9">9</button>
            <button class="key operator" data-action="operator" data-value="*">×</button>

            <button class="key num" data-action="num" data-value="4">4</button>
            <button class="key num" data-action="num" data-value="5">5</button>
            <button class="key num" data-action="num" data-value="6">6</button>
            <button class="key operator" data-action="operator" data-value="-">−</button>

            <button class="key num" data-action="num" data-value="1">1</button>
            <button class="key num" data-action="num" data-value="2">2</button>
            <button class="key num" data-action="num" data-value="3">3</button>
            <button class="key operator" data-action="operator" data-value="+">+</button>

            <button class="key num" data-action="sign">±</button>
            <button class="key num" data-action="num" data-value="0">0</button>
            <button class="key num" data-action="decimal">.</button>
            <button class="key equals" data-action="equals">=</button>

            <button class="key op-light wide" data-action="percent">%</button>
          </div>
        </div>
      </div>
    </div>
  </div>

<script src="script.js"></script>
</body>
</html>
