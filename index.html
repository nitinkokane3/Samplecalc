<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Advanced Calculator</title>
<link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app">
    <div class="calculator" id="calculator">
      <div class="top-bar">
        <div class="mode-switch">
          <button class="mode-btn active" data-mode="standard" data-i18n="standard">Standard</button>
          <button class="mode-btn" data-mode="scientific" data-i18n="scientific">Scientific</button>
          <button class="mode-btn" data-mode="programmer" data-i18n="programmer">Programmer</button>
          <button class="mode-btn" data-mode="converter" data-i18n="converter">Converter</button>
          <button class="mode-btn" data-mode="statistics" data-i18n="statistics">Statistics</button>
          <button class="mode-btn" data-mode="solver" data-i18n="solverMode">Solver</button>
          <button class="mode-btn" data-mode="graphing" data-i18n="graphing">Graph</button>
        </div>
        <div class="top-actions">
          <button class="icon-btn" id="helpToggle" title="Keyboard shortcuts" data-i18n-title="helpToggleTitle">⌨</button>
          <button class="icon-btn" id="historyToggle" title="History" data-i18n-title="historyToggleTitle">🕘</button>
          <button class="icon-btn lang-btn" id="langToggle" title="Toggle language" data-i18n-title="langToggleTitle">EN</button>
          <button class="icon-btn" id="themeToggle" title="Toggle theme" data-i18n-title="themeToggleTitle">🌙</button>
        </div>
      </div>

      <div class="base-tabs" id="baseTabs">
        <button class="base-btn" data-base="16">HEX</button>
        <button class="base-btn active" data-base="10">DEC</button>
        <button class="base-btn" data-base="8">OCT</button>
        <button class="base-btn" data-base="2">BIN</button>
      </div>

      <div class="category-tabs" id="categoryTabs">
        <button class="category-btn active" data-category="length" data-i18n="catLength">Length</button>
        <button class="category-btn" data-category="weight" data-i18n="catWeight">Weight</button>
        <button class="category-btn" data-category="temperature" data-i18n="catTemp">Temp</button>
        <button class="category-btn" data-category="data" data-i18n="catData">Data</button>
      </div>

      <div class="unit-row" id="unitRow">
        <select class="unit-select" id="fromUnit"></select>
        <button class="swap-btn" id="swapUnits" title="Swap units" data-i18n-title="swapTitle">⇅</button>
        <select class="unit-select" id="toUnit"></select>
      </div>

      <div class="solver-tabs" id="solverTabs">
        <button class="solver-type-btn active" data-type="linear" data-i18n="solverLinear">Linear</button>
        <button class="solver-type-btn" data-type="quadratic" data-i18n="solverQuadratic">Quadratic</button>
      </div>

      <div class="graph-toolbar" id="graphToolbar">
        <button class="graph-tool-btn" data-action="graphreset" data-i18n="graphReset">Reset</button>
        <button class="graph-tool-btn" data-action="graphzoomin" data-i18n="graphZoomIn">Zoom +</button>
        <button class="graph-tool-btn" data-action="graphzoomout" data-i18n="graphZoomOut">Zoom −</button>
        <button class="graph-tool-btn" data-action="graphfindroots" data-i18n="graphFindRoots">Roots</button>
        <button class="graph-tool-btn" data-action="graphintegral">∫dx</button>
      </div>

      <div class="display">
        <div class="expression" id="expression"></div>
        <div class="result" id="result">0</div>
        <div class="memory-indicator" id="memoryIndicator"></div>
      </div>

      <div class="graph-canvas-wrap" id="graphCanvasWrap">
        <canvas id="graphCanvas"></canvas>
      </div>

      <div class="conv-panel" id="convPanel">
        <div class="conv-row"><span class="conv-label">HEX</span><span class="conv-value" id="convHex">0</span></div>
        <div class="conv-row"><span class="conv-label">DEC</span><span class="conv-value" id="convDec">0</span></div>
        <div class="conv-row"><span class="conv-label">OCT</span><span class="conv-value" id="convOct">0</span></div>
        <div class="conv-row"><span class="conv-label">BIN</span><span class="conv-value" id="convBin">0</span></div>
      </div>

      <div class="conv-panel stat-panel" id="statPanel">
        <div class="conv-row"><span class="conv-label">N</span><span class="conv-value" id="statN">0</span></div>
        <div class="conv-row"><span class="conv-label">Σx</span><span class="conv-value" id="statSum">0</span></div>
        <div class="conv-row"><span class="conv-label" data-i18n="statMean">Mean</span><span class="conv-value" id="statMean">0</span></div>
        <div class="conv-row"><span class="conv-label" data-i18n="statMedian">Median</span><span class="conv-value" id="statMedian">0</span></div>
        <div class="conv-row"><span class="conv-label" data-i18n="statMode">Mode</span><span class="conv-value" id="statMode">—</span></div>
        <div class="conv-row"><span class="conv-label">Q1</span><span class="conv-value" id="statQ1">—</span></div>
        <div class="conv-row"><span class="conv-label">Q3</span><span class="conv-value" id="statQ3">—</span></div>
        <div class="conv-row"><span class="conv-label">IQR</span><span class="conv-value" id="statIQR">—</span></div>
        <div class="conv-row"><span class="conv-label">σ</span><span class="conv-value" id="statPStd">0</span></div>
        <div class="conv-row"><span class="conv-label">s</span><span class="conv-value" id="statSStd">—</span></div>
        <div class="conv-row"><span class="conv-label" data-i18n="statMin">Min</span><span class="conv-value" id="statMin">0</span></div>
        <div class="conv-row"><span class="conv-label" data-i18n="statMax">Max</span><span class="conv-value" id="statMax">0</span></div>
        <div class="conv-row"><span class="conv-label" data-i18n="statRange">Range</span><span class="conv-value" id="statRange">0</span></div>
      </div>

      <div class="stat-chips" id="statChips"></div>

      <div class="conv-panel solver-panel" id="solverPanel">
        <div class="conv-row solver-field" data-field="a"><span class="conv-label">a</span><span class="conv-value" id="solverA">1</span></div>
        <div class="conv-row solver-field" data-field="b"><span class="conv-label">b</span><span class="conv-value" id="solverB">0</span></div>
        <div class="conv-row solver-field" data-field="c" id="solverCRow"><span class="conv-label">c</span><span class="conv-value" id="solverC">0</span></div>
      </div>

      <div class="panels">
        <div class="history-panel" id="historyPanel">
          <div class="history-header">
            <span data-i18n="historyLabel">History</span>
            <button id="clearHistory" data-i18n="clearLabel">Clear</button>
          </div>
          <ul id="historyList" class="history-list"></ul>
        </div>

        <div class="keys-wrapper">
          <div class="sci-row" id="sciRow">
            <button class="key fn" data-action="deg-rad" id="degRadBtn">RAD</button>
            <button class="key fn" data-action="fn" data-value="sin(">sin</button>
            <button class="key fn" data-action="fn" data-value="cos(">cos</button>
            <button class="key fn" data-action="fn" data-value="tan(">tan</button>
            <button class="key fn" data-action="fn" data-value="log(">log</button>
            <button class="key fn" data-action="fn" data-value="ln(">ln</button>
            <button class="key fn" data-action="pow2">x²</button>
            <button class="key fn" data-action="pow">x^y</button>
            <button class="key fn" data-action="sqrt">√</button>
            <button class="key fn" data-action="fact">n!</button>
            <button class="key fn" data-value="(" data-action="paren">(</button>
            <button class="key fn" data-value=")" data-action="paren">)</button>
            <button class="key fn" data-action="const" data-value="π">π</button>
            <button class="key fn" data-action="const" data-value="e">e</button>
            <button class="key fn" data-action="inv">1/x</button>
          </div>

          <div class="keys" id="keys">
            <button class="key memory" data-action="mc">MC</button>
            <button class="key memory" data-action="mr">MR</button>
            <button class="key memory" data-action="mplus">M+</button>
            <button class="key memory" data-action="mminus">M-</button>

            <button class="key op-light" data-action="clear-entry">CE</button>
            <button class="key op-light" data-action="clear">C</button>
            <button class="key op-light" data-action="backspace">⌫</button>
            <button class="key operator" data-action="operator" data-value="/">÷</button>

            <button class="key num" data-action="num" data-value="7">7</button>
            <button class="key num" data-action="num" data-value="8">8</button>
            <button class="key num" data-action="num" data-value="9">9</button>
            <button class="key operator" data-action="operator" data-value="*">×</button>

            <button class="key num" data-action="num" data-value="4">4</button>
            <button class="key num" data-action="num" data-value="5">5</button>
            <button class="key num" data-action="num" data-value="6">6</button>
            <button class="key operator" data-action="operator" data-value="-">−</button>

            <button class="key num" data-action="num" data-value="1">1</button>
            <button class="key num" data-action="num" data-value="2">2</button>
            <button class="key num" data-action="num" data-value="3">3</button>
            <button class="key operator" data-action="operator" data-value="+">+</button>

            <button class="key num" data-action="sign">±</button>
            <button class="key num" data-action="num" data-value="0">0</button>
            <button class="key num" data-action="decimal">.</button>
            <button class="key equals" data-action="equals">=</button>

            <button class="key op-light half" data-action="percent">%</button>
            <button class="key op-light half" data-action="ans">ANS</button>
          </div>

          <div class="prog-row" id="progRow">
            <button class="key fn" data-action="progdigit" data-value="A">A</button>
            <button class="key fn" data-action="progdigit" data-value="B">B</button>
            <button class="key fn" data-action="progdigit" data-value="C">C</button>
            <button class="key fn" data-action="progdigit" data-value="D">D</button>
            <button class="key fn" data-action="progdigit" data-value="E">E</button>
            <button class="key fn" data-action="progdigit" data-value="F">F</button>
            <button class="key fn" data-action="bitop" data-value="and">AND</button>
            <button class="key fn" data-action="bitop" data-value="or">OR</button>
            <button class="key fn" data-action="bitop" data-value="xor">XOR</button>
            <button class="key fn" data-action="bitop" data-value="not">NOT</button>
            <button class="key fn" data-action="bitop" data-value="lsh">&lt;&lt;</button>
            <button class="key fn" data-action="bitop" data-value="rsh">&gt;&gt;</button>
          </div>

          <div class="keys prog-keys" id="progKeys">
            <button class="key memory" data-action="mc">MC</button>
            <button class="key memory" data-action="mr">MR</button>
            <button class="key memory" data-action="mplus">M+</button>
            <button class="key memory" data-action="mminus">M-</button>

            <button class="key op-light" data-action="clear-entry">CE</button>
            <button class="key op-light" data-action="clear">C</button>
            <button class="key op-light" data-action="backspace">⌫</button>
            <button class="key operator" data-action="progop" data-value="div">÷</button>

            <button class="key num" data-action="progdigit" data-value="7">7</button>
            <button class="key num" data-action="progdigit" data-value="8">8</button>
            <button class="key num" data-action="progdigit" data-value="9">9</button>
            <button class="key operator" data-action="progop" data-value="mul">×</button>

            <button class="key num" data-action="progdigit" data-value="4">4</button>
            <button class="key num" data-action="progdigit" data-value="5">5</button>
            <button class="key num" data-action="progdigit" data-value="6">6</button>
            <button class="key operator" data-action="progop" data-value="sub">−</button>

            <button class="key num" data-action="progdigit" data-value="1">1</button>
            <button class="key num" data-action="progdigit" data-value="2">2</button>
            <button class="key num" data-action="progdigit" data-value="3">3</button>
            <button class="key operator" data-action="progop" data-value="add">+</button>

            <button class="key op-light" data-action="progop" data-value="mod">MOD</button>
            <button class="key num" data-action="progdigit" data-value="0">0</button>
            <button class="key op-light" data-action="ans">ANS</button>
            <button class="key equals" data-action="progequals">=</button>
          </div>

          <div class="keys conv-keys" id="convKeys">
            <button class="key op-light" data-action="clear">C</button>
            <button class="key op-light" data-action="clear-entry">CE</button>
            <button class="key op-light" data-action="backspace">⌫</button>

            <button class="key num" data-action="convdigit" data-value="7">7</button>
            <button class="key num" data-action="convdigit" data-value="8">8</button>
            <button class="key num" data-action="convdigit" data-value="9">9</button>

            <button class="key num" data-action="convdigit" data-value="4">4</button>
            <button class="key num" data-action="convdigit" data-value="5">5</button>
            <button class="key num" data-action="convdigit" data-value="6">6</button>

            <button class="key num" data-action="convdigit" data-value="1">1</button>
            <button class="key num" data-action="convdigit" data-value="2">2</button>
            <button class="key num" data-action="convdigit" data-value="3">3</button>

            <button class="key num" data-action="convsign">±</button>
            <button class="key num" data-action="convdigit" data-value="0">0</button>
            <button class="key num" data-action="convdecimal">.</button>

            <button class="key op-light wide-3" data-action="ans">ANS</button>
          </div>

          <div class="keys stat-keys" id="statKeys">
            <button class="key op-light" data-action="clear">C</button>
            <button class="key op-light" data-action="clear-entry">CE</button>
            <button class="key op-light" data-action="backspace">⌫</button>

            <button class="key num" data-action="statdigit" data-value="7">7</button>
            <button class="key num" data-action="statdigit" data-value="8">8</button>
            <button class="key num" data-action="statdigit" data-value="9">9</button>

            <button class="key num" data-action="statdigit" data-value="4">4</button>
            <button class="key num" data-action="statdigit" data-value="5">5</button>
            <button class="key num" data-action="statdigit" data-value="6">6</button>

            <button class="key num" data-action="statdigit" data-value="1">1</button>
            <button class="key num" data-action="statdigit" data-value="2">2</button>
            <button class="key num" data-action="statdigit" data-value="3">3</button>

            <button class="key num" data-action="statsign">±</button>
            <button class="key num" data-action="statdigit" data-value="0">0</button>
            <button class="key num" data-action="statdecimal">.</button>

            <button class="key op-light" data-action="ans">ANS</button>
            <button class="key equals span2" data-action="statadd" data-i18n="statAdd">Add</button>
          </div>

          <div class="keys solver-keys" id="solverKeys">
            <button class="key op-light" data-action="clear">C</button>
            <button class="key op-light" data-action="clear-entry">CE</button>
            <button class="key op-light" data-action="backspace">⌫</button>

            <button class="key num" data-action="solverdigit" data-value="7">7</button>
            <button class="key num" data-action="solverdigit" data-value="8">8</button>
            <button class="key num" data-action="solverdigit" data-value="9">9</button>

            <button class="key num" data-action="solverdigit" data-value="4">4</button>
            <button class="key num" data-action="solverdigit" data-value="5">5</button>
            <button class="key num" data-action="solverdigit" data-value="6">6</button>

            <button class="key num" data-action="solverdigit" data-value="1">1</button>
            <button class="key num" data-action="solverdigit" data-value="2">2</button>
            <button class="key num" data-action="solverdigit" data-value="3">3</button>

            <button class="key num" data-action="solversign">±</button>
            <button class="key num" data-action="solverdigit" data-value="0">0</button>
            <button class="key num" data-action="solverdecimal">.</button>

            <button class="key op-light" data-action="ans">ANS</button>
            <button class="key equals span2" data-action="solvernext" data-i18n="solverNext">Next</button>
          </div>

          <div class="prog-row graph-row" id="graphRow">
            <button class="key fn" data-action="graphvar">x</button>
            <button class="key fn" data-action="graphfn" data-value="sin(">sin</button>
            <button class="key fn" data-action="graphfn" data-value="cos(">cos</button>
            <button class="key fn" data-action="graphfn" data-value="tan(">tan</button>

            <button class="key fn" data-action="graphfn" data-value="log(">log</button>
            <button class="key fn" data-action="graphfn" data-value="ln(">ln</button>
            <button class="key fn" data-action="graphfn" data-value="sqrt(">√</button>
            <button class="key fn" data-action="graphop" data-value="^">^</button>

            <button class="key fn" data-action="graphparen" data-value="(">(</button>
            <button class="key fn" data-action="graphparen" data-value=")">)</button>
            <button class="key fn" data-action="graphconst" data-value="π">π</button>
            <button class="key fn" data-action="graphconst" data-value="e">e</button>
          </div>

          <div class="keys graph-keys" id="graphKeys">
            <button class="key op-light" data-action="graphclear">C</button>
            <button class="key op-light" data-action="graphbackspace">⌫</button>
            <button class="key operator" data-action="graphop" data-value="/">÷</button>
            <button class="key operator" data-action="graphop" data-value="*">×</button>

            <button class="key num" data-action="graphdigit" data-value="7">7</button>
            <button class="key num" data-action="graphdigit" data-value="8">8</button>
            <button class="key num" data-action="graphdigit" data-value="9">9</button>
            <button class="key operator" data-action="graphop" data-value="-">−</button>

            <button class="key num" data-action="graphdigit" data-value="4">4</button>
            <button class="key num" data-action="graphdigit" data-value="5">5</button>
            <button class="key num" data-action="graphdigit" data-value="6">6</button>
            <button class="key operator" data-action="graphop" data-value="+">+</button>

            <button class="key num" data-action="graphdigit" data-value="1">1</button>
            <button class="key num" data-action="graphdigit" data-value="2">2</button>
            <button class="key num" data-action="graphdigit" data-value="3">3</button>
            <button class="key num" data-action="graphdecimal">.</button>

            <button class="key num" data-action="graphdigit" data-value="0">0</button>
            <button class="key equals wide-3" data-action="graphplot" data-i18n="graphPlot">Plot</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div class="help-overlay" id="helpOverlay">
    <div class="help-modal">
      <div class="help-header">
        <span data-i18n="helpTitle">Keyboard Shortcuts</span>
        <button id="helpClose" aria-label="Close">&times;</button>
      </div>
      <div class="help-body" id="helpBody"></div>
    </div>
  </div>

<script src="script.js"></script>
</body>
</html>
